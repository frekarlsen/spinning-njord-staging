services:

  spinning-web:
    build:
      context: ./frontend
      args:
        VITE_API_KEY: ${API_KEY:-njord-secret-change-me}
    container_name: spinning-staging-web
    restart: unless-stopped
    ports:
      - "3457:80"
    depends_on:
      - spinning-staging-api
    networks:
      - spinning-staging-net

  spinning-api:
    build: ./backend
    container_name: spinning-staging-api
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY:-njord-secret-change-me}
      - PORT=4000
      - DATA_DIR=/app/data
    volumes:
      - spinning-staging-data:/app/data
    networks:
      - spinning-staging-net

volumes:
  spinning-staging-data:

networks:
  spinning-staging-net:
